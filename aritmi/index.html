<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aritmi - ¡Aprende a sumar!</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Baloo 2', cursive, sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width: 450px) {
            .app {
                border-radius: 24px;
                height: 90vh;
            }
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 10px;
            background: #fff;
            border-bottom: 2px solid #f1f5f9;
            z-index: 10;
        }
        
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .menu-btn {
            width: 44px;
            height: 44px;
            background: #eef2f5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            color: #333;
        }
        .menu-btn:active { transform: scale(0.9); }
        .menu-btn.active { background: #dbeafe; }
        
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 220px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.15);
            border-radius: 16px;
            z-index: 100;
            top: 55px;
            left: 0;
            overflow: hidden;
            border: 2px solid #f1f5f9;
        }
        .dropdown-content.show {
            display: block;
            animation: fadeIn 0.2s ease-out;
        }
        .dropdown-content a {
            color: #4a4a4a;
            padding: 14px 20px;
            text-decoration: none;
            display: block;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.2s;
        }
        .dropdown-content a:hover {
            background-color: #f8fafc;
        }
        .dropdown-content a.active {
            background-color: #e6f7ff;
            color: #f97316;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .level-info {
            text-align: center;
            flex: 1;
        }
        .level-info h1 {
            margin: 0;
            font-size: 24px;
            color: #2c3e50;
            font-weight: 800;
        }
        .score {
            color: #10b981;
            font-size: 18px;
            font-weight: 700;
            margin-top: 2px;
        }
        
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #f8fafc;
            position: relative;
        }

        .question-container {
            background: #ffffff;
            width: 100%;
            padding: 30px 20px;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            text-align: center;
            margin-bottom: 30px;
        }

        .visual-aid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
            background: #fff9f0;
            border-radius: 16px;
            border: 2px dashed #ffedd5;
        }

        .emoji {
            font-size: 32px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .operator {
            font-size: 32px;
            font-weight: 800;
            color: #f97316;
        }

        .math-text {
            font-size: 48px;
            font-weight: 800;
            color: #2c3e50;
            margin: 10px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .option-btn {
            background: #ffffff;
            border: 4px solid #f1f5f9;
            border-radius: 20px;
            padding: 20px;
            font-size: 36px;
            font-family: inherit;
            font-weight: 800;
            color: #2c3e50;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .option-btn:active {
            transform: scale(0.9);
        }

        .option-btn.correct {
            background-color: #dcfce7;
            border-color: #22c55e;
            color: #15803d;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #b91c1c;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.4s;
        }
        .modal.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .modal-content {
            background: #fff;
            padding: 40px 30px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transform: scale(1) translateY(0);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 85%;
            max-width: 320px;
        }
        .modal.hidden .modal-content {
            transform: scale(0.8) translateY(20px);
        }
        .modal h2 {
            color: #f97316;
            font-size: 32px;
            margin: 0 0 8px;
            font-weight: 800;
        }
        .modal p {
            color: #64748b;
            font-size: 18px;
            margin: 0 0 28px;
            font-weight: 500;
        }
        .btn {
            background: #f97316;
            color: #fff;
            border: none;
            padding: 16px 32px;
            font-size: 20px;
            font-family: inherit;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
        }

        .music-btn {
            width: 44px;
            height: 44px;
            background: #eef2f5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        .music-btn:active { transform: scale(0.9); }
        .music-btn.playing { background: #dbeafe; }

        .instructions {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
            color: #64748b;
            font-weight: 500;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="dropdown">
            <div class="menu-btn" id="menu-btn">☰</div>
            <div class="dropdown-content" id="dropdown-menu">
                <a href="../benji-al-rescate/index.html">🐶 Benji al Rescate!</a>
                <a href="../color-fun/index.html">🎨 Color Fun!</a>
                <a href="#" class="active">🔢 Aritmi</a>
            </div>
        </div>
        <div class="level-info">
            <h1 id="level-title">Nivel 1</h1>
            <div class="score" id="score-display">Puntos: 0</div>
        </div>
        <div class="music-btn" id="music-btn" title="Música">🔇</div>
    </header>
    
    <div class="game-area">
        <div class="question-container">
            <div class="visual-aid" id="visual-aid">
                <!-- Emojis will go here -->
            </div>
            <div class="math-text" id="math-text">
                2 + 1 = ?
            </div>
        </div>

        <div class="options-grid" id="options-grid">
            <!-- Options will go here -->
        </div>

        <div class="instructions">¡Toca la respuesta correcta!</div>
    </div>
    
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <div id="modal-emoji" style="font-size: 60px; margin-bottom: 10px;">🌟</div>
            <h2 id="modal-title">¡Excelente!</h2>
            <p id="modal-desc">¡Eres un genio de las matemáticas!</p>
            <button class="btn" id="next-btn">¡Otro más! 🚀</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIG ---
    const successSound = new Audio('../color-fun/floraphonic-woman-excited-cheers-and-phrases-says-yippee-2-186752.mp3');
    const bgMusic = new Audio('../assets/bg_music.mp3');
    bgMusic.loop = true;
    let isMusicPlaying = false;
    const EMOJIS = ['🍎', '⭐', '🎈', '🍪', '🐸', '🦁', '🚗', '🍦'];

    let score = 0;
    let currentLevel = 1;
    let consecutiveWins = 0;
    let currentProblem = {};
    let isLocked = false;
    let isWin = true;

    // --- ELEMENTS ---
    const visualAid = document.getElementById('visual-aid');
    const mathText = document.getElementById('math-text');
    const optionsGrid = document.getElementById('options-grid');
    const scoreDisplay = document.getElementById('score-display');
    const modal = document.getElementById('result-modal');
    const nextBtn = document.getElementById('next-btn');

    // --- DROPDOWN MENU ---
    document.addEventListener('DOMContentLoaded', () => {
        const menuBtn = document.getElementById('menu-btn');
        const dropdownMenu = document.getElementById('dropdown-menu');
        
        menuBtn.addEventListener('click', (e) => {
            dropdownMenu.classList.toggle('show');
            menuBtn.classList.toggle('active');
            e.stopPropagation();
        });
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) {
                dropdownMenu.classList.remove('show');
                menuBtn.classList.remove('active');
            }
        });

        const musicBtn = document.getElementById('music-btn');
        function startMusic() {
            if (!isMusicPlaying) {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    musicBtn.innerText = '🔊';
                    musicBtn.classList.add('playing');
                }).catch(e => console.log('Audio play failed:', e));
            }
        }

        musicBtn.addEventListener('click', () => {
            if(isMusicPlaying) {
                musicBtn.innerText = '🔇';
                musicBtn.classList.remove('playing');
                bgMusic.pause();
                isMusicPlaying = false;
            } else {
                startMusic();
            }
        });

        document.addEventListener('click', startMusic, { once: true });
        document.addEventListener('touchstart', startMusic, { once: true });

        generateProblem();
    });

    // --- TTS SYSTEM ---
    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'es-ES'; 
            msg.rate = 1.0;
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }
    }

    function speakProblem(a, b) {
        speakText(`¿Cuánto es ${a} más ${b}?`);
    }

    // --- GAME LOGIC ---
    function generateProblem() {
        isLocked = false;
        document.getElementById('level-title').innerText = `Nivel ${currentLevel}`;
        
        // Difficulty scaling based on level
        // Level 1: 1-3 + 1-3 (max 6)
        // Level 2: 1-5 + 1-5 (max 10)
        // Level 3: 1-7 + 1-7 (max 14)
        const maxNum = 2 + currentLevel; 
        const a = Math.floor(Math.random() * maxNum) + 1;
        const b = Math.floor(Math.random() * maxNum) + 1;
        const result = a + b;

        currentProblem = { a, b, result };

        // Visual Aid
        const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        visualAid.innerHTML = `
            <div class="group">${Array(a).fill(`<span class="emoji">${emoji}</span>`).join('')}</div>
            <div class="operator">+</div>
            <div class="group">${Array(b).fill(`<span class="emoji">${emoji}</span>`).join('')}</div>
        `;

        mathText.innerText = `${a} + ${b} = ?`;

        // Options
        const options = [result];
        while (options.length < 3) {
            const wrong = Math.floor(Math.random() * 10) + 1;
            if (!options.includes(wrong)) options.push(wrong);
        }
        options.sort(() => Math.random() - 0.5);

        optionsGrid.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsGrid.appendChild(btn);
        });

        speakProblem(a, b);
    }

    function checkAnswer(selected, btn) {
        if (isLocked) return;

        if (selected === currentProblem.result) {
            isLocked = true;
            btn.classList.add('correct');
            score += 10;
            scoreDisplay.innerText = `Puntos: ${score}`;
            
            // Lower music volume while speaking
            if (bgMusic) bgMusic.volume = 0.2;
            speakText(`${currentProblem.a} más ${currentProblem.b} es ${currentProblem.result}`);
            
            successSound.currentTime = 0;
            successSound.play().catch(e => console.log("Audio play failed", e));
            
            setTimeout(() => {
                if (bgMusic) bgMusic.volume = 1.0;
                showWinModal();
            }, 1500); // Wait a bit more for the speech to finish
        } else {
            btn.classList.add('wrong');
            speakText('Ese no');
            setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }

    function showWinModal() {
        isWin = true;
        document.getElementById('modal-emoji').innerText = '🌟';
        document.getElementById('modal-title').innerText = '¡Excelente!';
        document.getElementById('modal-desc').innerText = '¡Eres un genio de las matemáticas!';
        nextBtn.innerText = '¡Otro más! 🚀';
        nextBtn.style.background = '#f97316';
        spawnConfetti();
        modal.classList.remove('hidden');
    }

    function showLoseModal() {
        isWin = false;
        document.getElementById('modal-emoji').innerText = '💔';
        document.getElementById('modal-title').innerText = '¡Oh no!';
        document.getElementById('modal-desc').innerText = 'Inténtalo de nuevo';
        nextBtn.innerText = 'Reintentar 🔄';
        nextBtn.style.background = '#ef4444';
        modal.classList.remove('hidden');
    }

    nextBtn.onclick = () => {
        modal.classList.add('hidden');
        if (isWin) {
            consecutiveWins++;
            if (consecutiveWins >= 6) {
                currentLevel++;
                consecutiveWins = 0;
            }
        } else {
            consecutiveWins = 0;
            if (currentLevel > 1) {
                currentLevel--;
            }
        }
        generateProblem();
    };

    function spawnConfetti() {
        const colors = ['#ef4444', '#3b82f6', '#10b981', '#fbbf24', '#8b5cf6'];
        for(let i=0; i<60; i++) {
            let conf = document.createElement('div');
            conf.style.position = 'absolute';
            conf.style.width = Math.random() > 0.5 ? '12px' : '8px';
            conf.style.height = Math.random() > 0.5 ? '12px' : '8px';
            conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
            conf.style.left = '50%';
            conf.style.top = '40%';
            conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            conf.style.pointerEvents = 'none';
            conf.style.zIndex = '1000';
            conf.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(conf);
            
            let angle = Math.random() * Math.PI * 2;
            let velocity = 5 + Math.random() * 15;
            let vx = Math.cos(angle) * velocity;
            let vy = Math.sin(angle) * velocity - 5; 
            let rotSpeed = (Math.random() - 0.5) * 10;
            let currentRot = 0;
            
            function anim() {
                let left = parseFloat(conf.style.left) + vx;
                let top = parseFloat(conf.style.top) + vy;
                vy += 0.4; 
                currentRot += rotSpeed;
                
                conf.style.left = left + 'px';
                conf.style.top = top + 'px';
                conf.style.transform = `rotate(${currentRot}deg)`;
                
                if(top > window.innerHeight) {
                    conf.remove();
                    return;
                }
                requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);
        }
    }
</script>
</body>
</html>
